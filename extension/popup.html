<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span>🔍</span>
    <span class="logo">LeadFinder</span>
    <span class="version">v1.0</span>
  </div>

  <div class="auth-section" id="authSection" style="padding: 16px; display: none;">
    <p style="margin-bottom: 12px; font-size: 13px; color: var(--muted);">Please login to continue</p>
    <input type="text" id="extUser" placeholder="Username" style="width:100%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #333; background: #1e2332; color: #fff; outline:none;">
    <input type="password" id="extPass" placeholder="Password" style="width:100%; padding: 8px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #333; background: #1e2332; color: #fff; outline:none;">
    <button class="btn btn-primary" id="extLoginBtn">Login</button>
    <p id="extAuthError" style="color: #ef4444; font-size: 11px; margin-top: 8px; display:none;"></p>
  </div>

  <div class="body" id="mainBody">
    <div class="status-box">
      <div class="status-row">
        <span class="status-label">Backend</span>
        <span class="status-val" id="backendStatus">Checking…</span>
      </div>
      <div class="status-row">
        <span class="status-label">Page type</span>
        <span class="status-val blue" id="pageType">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Total leads saved</span>
        <span class="status-val green" id="totalLeads">—</span>
      </div>
    </div>

    <div class="page-info" id="pageUrl">Loading…</div>

    <button class="btn btn-primary" id="crawlBtn" disabled>
      🔍 Crawl this page
    </button>

    <div class="divider"></div>

    <button class="btn btn-ghost" id="openDashboard">
      📊 Open Dashboard
    </button>

    <div class="result-box" id="resultBox"></div>
  </div>

  <div class="footer" id="mainFooter">
    <button class="btn btn-ghost" id="logoutExtBtn" style="flex:1;font-size:12px;color:#ef4444">Logout</button>
    <button class="btn btn-ghost" id="exportBtn" style="flex:1;font-size:12px">⬇ Export CSV</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
