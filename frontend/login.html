<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LeadFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg) !important;
    }
    .auth-card {
      background-color: var(--bg2) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius);
      padding: 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.04);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo-container svg {
      width: 36px;
      height: 36px;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .logo-container h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>

  <div class="auth-card" id="authCard">
    <div class="logo-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="3"/></svg>
      <h1>LeadFinder</h1>
    </div>
    
    <div class="auth-header text-center mb-4">
      <h2 id="authTitle" class="h5 fw-bold mb-1" style="color: var(--accent);">Login</h2>
      <p id="authSubtitle" class="text-muted small">Enter your credentials</p>
    </div>
    
    <div class="mb-3">
      <input type="text" class="form-control" id="authUsername" placeholder="Username" onkeydown="if(event.key==='Enter') submitAuth()" style="background-color: var(--bg3); color: var(--text); border-color: var(--border); padding: 10px 14px;">
    </div>
    <div class="mb-4">
      <input type="password" class="form-control" id="authPassword" placeholder="Password" onkeydown="if(event.key==='Enter') submitAuth()" style="background-color: var(--bg3); color: var(--text); border-color: var(--border); padding: 10px 14px;">
    </div>
    
    <button class="btn btn-primary w-100 fw-semibold mb-3" id="authSubmitBtn" onclick="submitAuth()" style="padding: 11px;">Login</button>
    
    <div class="auth-toggle text-center text-muted small" onclick="toggleAuthMode()" style="cursor: pointer;">
      Don't have an account? <span id="authToggleText" style="color: var(--accent); font-weight:500;">Register</span>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
