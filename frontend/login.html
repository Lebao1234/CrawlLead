<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LeadFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .auth-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo-container svg {
      width: 32px;
      height: 32px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .logo-container h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="auth-card" id="authCard">
    <div class="logo-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="3"/></svg>
      <h1>LeadFinder</h1>
    </div>
    <div class="auth-header">
      <h2 id="authTitle" style="font-size:16px; color:var(--accent);">Login</h2>
      <p id="authSubtitle">Enter your credentials</p>
    </div>
    <input type="text" class="auth-input" id="authUsername" placeholder="Username" onkeydown="if(event.key==='Enter') submitAuth()">
    <input type="password" class="auth-input" id="authPassword" placeholder="Password" onkeydown="if(event.key==='Enter') submitAuth()">
    <button class="auth-btn" id="authSubmitBtn" onclick="submitAuth()">Login</button>
    <div class="auth-toggle" onclick="toggleAuthMode()">
      Don't have an account? <span id="authToggleText">Register</span>
    </div>
  </div>

  <div id="toast"></div>

  <script src="auth.js"></script>
</body>
</html>
